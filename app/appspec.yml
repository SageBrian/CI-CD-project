version: 0.0
os: linux

files:
  - source: /app
    destination: /home/ec2-user/app

hooks:
  # Runs before the new version is installed
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  # Runs after files are copied to EC2
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: ec2-user

  # Starts the application
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ec2-user

  # Validates the deployment was successful
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: ec2-user
